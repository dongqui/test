overwrite: true
schema:
  - https://graphql.fauna.com/graphql:
      headers:
        Authorization: Basic NEXT_PUBLIC_TOKEN
documents: "graphql/*.gql"
generates:
  generated/graphql.tsx:
    plugins:
      - "typescript"
      - "typescript-operations"
      - "typescript-react-apollo"
  ./graphql.schema.json:
    plugins:
      - "introspection"
