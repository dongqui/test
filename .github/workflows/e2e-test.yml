name: E2E Test

on:
  push:
    branches:
      - develop
    paths:
      # - "apps/tool/**"
      - .github/workflows/e2e-test.yml
jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Cypress run
        uses: cypress-io/github-action@v4
        with:
          working-directory: ./apps/tool
          browser: chrome
        env:
          CYPRESS_BASE_URL: https://dev-app.plask.ai/
